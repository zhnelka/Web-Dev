<h2>Album Photos</h2>

<div *ngIf="loading" class="info">Loading photos...</div>
<div *ngIf="!loading && error" class="error">{{ error }}</div>

<div *ngIf="!loading && !error && photos.length === 0" class="info">
  No photos found.
</div>

<div *ngIf="!loading && !error && photos.length > 0" class="grid">
  <figure class="photo" *ngFor="let p of photos">
    <img [src]="p.thumbnailUrl" [alt]="p.title" />
    <figcaption class="caption" title="{{ p.title }}">{{ p.title }}</figcaption>
  </figure>
</div>

<button class="btn" (click)="back()">Back</button>
